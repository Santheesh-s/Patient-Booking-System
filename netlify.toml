[build]
  # This is the correct command for Windows CMD
  # It copies your 'server' folder into 'netlify/functions'
  command = "xcopy server netlify\\functions\\server /E /I /Y"
  
  functions = "netlify/functions"

[[redirects]]
  # This rule makes your API routes work
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200